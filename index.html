<!DOCTYPE html>
<html>
<head>
  <title>Alia’s Birthday Invitation</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      background: #f5efe6;
      font-family: 'Great Vibes', cursive;
      color: #6b4c3b;
      text-align: center;
    }

    .card {
      width: 85vw;
      max-width: 360px;
      height: 200px;
      background: white;
      border: 1px solid #d6c3b3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
    }

    .invite {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: #f5efe6;
    }

    .box {
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 42px;
    }

    p {
      font-size: 22px;
    }

    input {
      padding: 10px;
      font-size: 18px;
      text-align: center;
      border: 1px solid #d6c3b3;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: 1px solid #6b4c3b;
      background: transparent;
      color: #6b4c3b;
      font-family: 'Great Vibes', cursive;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card" id="card" onclick="openInvite()">
  Open Invitation
</div>

<div class="invite" id="invite">
  <div class="box">

    <h1 id="title"></h1>

    <div id="form">
      <p>Enter Your Name</p>
      <input type="text" id="nameInput">
      <br>
      <button onclick="start()">Enter</button>
    </div>

    <div id="content" style="display:none;">
      <p>You Are Invited To Alia’s Birthday Dinner</p>
      <p>To Wave Goodbye To Her Teens</p>

      <p>Date: May 13</p>
      <p>Location: Luhv Restaurant</p>
      <p>Dress Code: All Black</p>

      <button onclick="yes()">Yes I Am Coming</button>
      <button onclick="no()">No Because I Am A Total Loser</button>
    </div>

  </div>
</div>

<script>
  function openInvite() {
    document.getElementById("card").style.display = "none";
    document.getElementById("invite").style.display = "flex";
  }

  function start() {
    let name = document.getElementById("nameInput").value;

    if (name === "") {
      alert("Enter Your Name");
      return;
    }

    document.getElementById("form").style.display = "none";
    document.getElementById("content").style.display = "block";

    document.getElementById("title").innerText =
      "Hey " + name.charAt(0).toUpperCase() + name.slice(1) + "’s Invite";
  }

  function yes() {
    alert("See You There");
  }

  function no() {
    alert("Rude. Try Again");
  }
</script>

</body>
</html>
