<!DOCTYPE html>
<html>
<head>
  <title>Alia Birthday Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      /* Paper texture background */
      background: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
      background-color: #f5efe6;

      font-family: 'Playfair Display', serif;
      color: #6b4c3b;
      overflow: hidden;
    }

    .card {
      width: 340px;
      height: 220px;
      background: rgba(255,255,255,0.7);
      border: 1px solid #d6c3b3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Great Vibes', cursive;
      font-size: 28px;
      cursor: pointer;
      transition: all 1s ease;
      position: relative;
      z-index: 2;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .card.open {
      transform: scale(2);
      opacity: 0;
    }

    .invite {
      position: absolute;
      opacity: 0;
      text-align: center;
      transition: opacity 1.5s ease;
      width: 90%;
      max-width: 600px;
    }

    .invite.show {
      opacity: 1;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
    }

    p {
      font-size: 18px;
      margin: 6px 0;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #d6c3b3;
      text-align: center;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      border-radius: 25px;
      border: 1px solid #6b4c3b;
      background: transparent;
      color: #6b4c3b;
      cursor: pointer;
    }

    button:hover {
      background: #6b4c3b;
      color: white;
    }

    #content {
      display: none;
    }

    /* CLEAN FLORAL DECOR (FIXED) */
    .floral {
      position: absolute;
      width: 140px;
      opacity: 0.35;
      pointer-events: none;
    }

    .tl { top: 0; left: 0; }
    .tr { top: 0; right: 0; transform: scaleX(-1); }
    .bl { bottom: 0; left: 0; transform: scaleY(-1); }
    .br { bottom: 0; right: 0; transform: scale(-1); }
  </style>
</head>

<body>

<!-- FLORAL DECOR (CLEAN) -->
<img class="floral tl" src="https://i.imgur.com/5bXz1sF.png">
<img class="floral tr" src="https://i.imgur.com/5bXz1sF.png">
<img class="floral bl" src="https://i.imgur.com/5bXz1sF.png">
<img class="floral br" src="https://i.imgur.com/5bXz1sF.png">

<div class="card" id="card" onclick="openCard()">
  Open Invitation
</div>

<div class="invite" id="invite">

  <div id="form">
    <h1>Enter Your Name</h1>
    <input type="text" id="nameInput" placeholder="Your Name">
    <br>
    <button onclick="startInvite()">Enter</button>
  </div>

  <div id="content">
    <h1 id="title"></h1>

    <p>You Are Invited To Alia Birthday Dinner</p>
    <p>To Wave Goodbye To Her Teens</p>

    <br>

    <p><strong>Date:</strong> May 13</p>
    <p><strong>Location:</strong> Luhv Restaurant</p>
    <p><strong>Dress Code:</strong> All Black</p>

    <br>

    <button onclick="yes()">Yes I Am Coming</button>
    <button onclick="no()">No Because I Am A Total Loser</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
  function openCard() {
    document.getElementById("card").classList.add("open");

    setTimeout(() => {
      document.getElementById("invite").classList.add("show");
    }, 800);
  }

  function startInvite() {
    const name = document.getElementById("nameInput").value;

    if (name.trim() === "") {
      alert("Enter Your Name");
      return;
    }

    document.getElementById("form").style.display = "none";
    document.getElementById("content").style.display = "block";

    document.getElementById("title").innerText =
      "Hey " + name.charAt(0).toUpperCase() + name.slice(1);
  }

  function yes() {
    confetti({ particleCount: 150, spread: 80 });
    alert("See You There");
  }

  function no() {
    alert("Rude. Try Again");
  }
</script>

</body>
</html>
