<!DOCTYPE html>
<html>
<head>
  <title>Alia Birthday Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5efe6;
      font-family: 'Playfair Display', serif;
      color: #6b4c3b;
      overflow: hidden;
    }

    /* CLOSED CARD */
    .card {
      width: 320px;
      height: 200px;
      background: #e8d8c3;
      border: 2px solid #6b4c3b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Great Vibes', cursive;
      font-size: 28px;
      cursor: pointer;
      transition: all 1s ease;
      position: relative;
      z-index: 2;
    }

    .card.open {
      transform: scale(2);
      opacity: 0;
    }

    /* INVITATION CONTENT */
    .invite {
      position: absolute;
      opacity: 0;
      text-align: center;
      transition: opacity 1.5s ease;
      width: 90%;
      max-width: 600px;
    }

    .invite.show {
      opacity: 1;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
    }

    p {
      font-size: 18px;
      margin: 6px 0;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      border-radius: 25px;
      border: 1px solid #6b4c3b;
      background: transparent;
      color: #6b4c3b;
      cursor: pointer;
    }

    button:hover {
      background: #6b4c3b;
      color: white;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #d6c3b3;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- CLOSED CARD -->
<div class="card" id="card" onclick="openCard()">
  Open Invitation
</div>

<!-- INVITATION CONTENT -->
<div class="invite" id="invite">

  <div id="form">
    <h1>Enter Your Name</h1>
    <input type="text" id="nameInput" placeholder="Your Name">
    <br>
    <button onclick="startInvite()">Enter</button>
  </div>

  <div id="content" style="display:none;">
    <h1 id="title"></h1>

    <p>You Are Invited To Alia Birthday Dinner</p>
    <p>To Wave Goodbye To Her Teens</p>

    <br>

    <p><strong>Date:</strong> May 13</p>
    <p><strong>Location:</strong> Luhv Restaurant</p>
    <p><strong>Dress Code:</strong> All Black</p>

    <br>

    <button onclick="yes()">Yes I Am Coming</button>
    <button onclick="no()">No Because I Am A Total Loser</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
  function openCard() {
    document.getElementById("card").classList.add("open");

    setTimeout(() => {
      document.getElementById("invite").classList.add("show");
    }, 800);
  }

  function startInvite() {
    const name = document.getElementById("nameInput").value;

    if (name.trim() === "") {
      alert("Enter Your Name");
      return;
    }

    document.getElementById("form").style.display = "none";
    document.getElementById("content").style.display = "block";

    document.getElementById("title").innerText =
      "Hey " + name.charAt(0).toUpperCase() + name.slice(1);
  }

  function yes() {
    confetti({ particleCount: 150, spread: 80 });
    alert("See You There");
  }

  function no() {
    alert("Rude. Try Again");
  }
</script>

</body>
</html>
