<!DOCTYPE html>
<html>
<head>
  <title>Alia Birthday Invitation</title>

  <!-- Elegant Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      /* Beige paper texture */
      background: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
      background-color: #f5efe6;

      font-family: 'Playfair Display', serif;
      color: #6b4c3b;
      text-align: center;
    }

    .card {
      width: 90%;
      max-width: 600px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid #d6c3b3;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin: 6px 0;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #d6c3b3;
      border-radius: 10px;
      text-align: center;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      border-radius: 25px;
      border: 1px solid #6b4c3b;
      background: transparent;
      color: #6b4c3b;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #6b4c3b;
      color: white;
    }

    #invite {
      display: none;
    }

    /* Floral corners */
    .corner {
      position: absolute;
      width: 90px;
      opacity: 0.7;
    }

    .top-left {
      top: 0;
      left: 0;
    }

    .top-right {
      top: 0;
      right: 0;
      transform: scaleX(-1);
    }

    .bottom-left {
      bottom: 0;
      left: 0;
      transform: scaleY(-1);
    }

    .bottom-right {
      bottom: 0;
      right: 0;
      transform: scale(-1);
    }
  </style>
</head>

<body>

<div class="card">

  <!-- Floral Corners -->
  <img class="corner top-left" src="https://i.imgur.com/5bXz1sF.png">
  <img class="corner top-right" src="https://i.imgur.com/5bXz1sF.png">
  <img class="corner bottom-left" src="https://i.imgur.com/5bXz1sF.png">
  <img class="corner bottom-right" src="https://i.imgur.com/5bXz1sF.png">

  <!-- Name Input -->
  <div id="form">
    <h1>Enter Your Name</h1>
    <input type="text" id="nameInput" placeholder="Your Name">
    <br>
    <button onclick="startInvite()">Enter</button>
  </div>

  <!-- Invitation -->
  <div id="invite">
    <h1 id="title"></h1>

    <p>You Are Invited To Alia Birthday Dinner</p>
    <p>To Wave Goodbye To Her Teens</p>

    <br>

    <p><strong>Date:</strong> May 13</p>
    <p><strong>Location:</strong> Luhv Restaurant</p>
    <p><strong>Dress Code:</strong> All Black</p>

    <br>

    <button onclick="yes()">Yes I Am Coming</button>
    <button onclick="no()">No Because I Am A Total Loser</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
  function startInvite() {
    const name = document.getElementById("nameInput").value;

    if (name.trim() === "") {
      alert("Enter Your Name");
      return;
    }

    document.getElementById("form").style.display = "none";
    document.getElementById("invite").style.display = "block";

    document.getElementById("title").innerText =
      "Hey " + name.charAt(0).toUpperCase() + name.slice(1);
  }

  function yes() {
    confetti({ particleCount: 150, spread: 80 });
    alert("See You There");
  }

  function no() {
    alert("Rude. Try Again");
  }
</script>

</body>
</html>
