<!DOCTYPE html>
<html>
<head>
  <title>Alia Birthday Invitation</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      background: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
      background-color: #f5efe6;

      font-family: 'Playfair Display', serif;
      color: #6b4c3b;
      overflow-x: hidden;
    }

    /* FULL SCREEN RESPONSIVE CARD */
    .card {
      width: 85vw;
      max-width: 400px;
      height: 220px;
      background: rgba(255,255,255,0.75);
      border: 1px solid #d6c3b3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Great Vibes', cursive;
      font-size: 30px;
      cursor: pointer;
      transition: all 1s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .card.open {
      transform: scale(1.8);
      opacity: 0;
    }

    /* INVITE FULL SCREEN FIX */
    .invite {
      position: absolute;
      width: 90vw;
      max-width: 500px;
      text-align: center;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .invite.show {
      opacity: 1;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      margin: 6px 0;
    }

    input {
      width: 80%;
      max-width: 280px;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #d6c3b3;
      text-align: center;
      margin-top: 10px;
    }

    button {
      margin: 10px;
      padding: 12px 18px;
      border-radius: 25px;
      border: 1px solid #6b4c3b;
      background: transparent;
      color: #6b4c3b;
      cursor: pointer;
      font-size: 14px;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.97);
    }

    #content {
      display: none;
    }
  </style>
</head>

<body>

<div class="card" id="card" onclick="openCard()">
  Open Invitation
</div>

<div class="invite" id="invite">

  <div id="form">
    <h1>Enter Your Name</h1>
    <input type="text" id="nameInput" placeholder="Your Name">
    <br>
    <button onclick="startInvite()">Enter</button>
  </div>

  <div id="content">
    <h1 id="title"></h1>

    <p>You Are Invited To Alia Birthday Dinner</p>
    <p>To Wave Goodbye To Her Teens</p>

    <br>

    <p><strong>Date:</strong> May 13</p>
    <p><strong>Location:</strong> Luhv Restaurant</p>
    <p><strong>Dress Code:</strong> All Black</p>

    <br>

    <button onclick="yes()">Yes I Am Coming</button>
    <button onclick="no()">No Because I Am A Total Loser</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
  function openCard() {
    document.getElementById("card").classList.add("open");

    setTimeout(() => {
      document.getElementById("invite").classList.add("show");
    }, 800);
  }

  function startInvite() {
    const name = document.getElementById("nameInput").value;

    if (name.trim() === "") {
      alert("Enter Your Name");
      return;
    }

    document.getElementById("form").style.display = "none";
    document.getElementById("content").style.display = "block";

    document.getElementById("title").innerText =
      "Hey " + name.charAt(0).toUpperCase() + name.slice(1);
  }

  function yes() {
    confetti({ particleCount: 150, spread: 80 });
    alert("See You There");
  }

  function no() {
    alert("Rude. Try Again");
  }
</script>

</body>
</html>
