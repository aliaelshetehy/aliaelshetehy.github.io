<!DOCTYPE html>
<html>
<head>
  <title>Alia’s Birthday 🤎</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      text-align: center;
      background: #f5efe6;
      color: #6b4c3b;
      margin-top: 100px;
      font-family: 'Playfair Display', serif;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 50px;
    }

    p {
      font-size: 20px;
      margin: 8px;
    }

    input {
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #d6c3b3;
      text-align: center;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 20px;
      border: 1px solid #6b4c3b;
      background: transparent;
      color: #6b4c3b;
      margin: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #6b4c3b;
      color: white;
    }

    #invite {
      display: none;
      animation: fadeIn 1.5s;
    }

    .decor {
      font-size: 24px;
      margin-bottom: 15px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="form">
  <h1>Enter your name 🤎</h1>
  <input type="text" id="nameInput" placeholder="Your name">
  <br>
  <button onclick="startInvite()">Enter</button>
</div>

<div id="invite">

  <div class="decor">🎀 🤍 🌿</div>

  <h1 id="title"></h1>

  <p>You’re invited to Alia’s birthday dinner</p>
  <p>to wave goodbye to her teens ✨</p>

  <br>

  <p><strong>Date:</strong> May 13</p>
  <p><strong>Location:</strong> Luhv Restaurant</p>
  <p><strong>Dress code:</strong> All Black</p>

  <br>

  <button onclick="yes()">Yes I’m coming</button>
  <button onclick="no()">No because I’m a total loser</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
  function startInvite() {
    const name = document.getElementById("nameInput").value;

    if (name.trim() === "") {
      alert("Enter your name 🤎");
      return;
    }

    document.getElementById("form").style.display = "none";
    document.getElementById("invite").style.display = "block";

    document.getElementById("title").innerText = "Hey " + name + " 🤎";

    // PLAY MUSIC 🎵
    document.getElementById("bgMusic").play();
  }

  function yes() {
    confetti({
      particleCount: 150,
      spread: 80
    });
    alert("Can’t wait to see you 🤎✨");
  }

  function no() {
    alert("Rude. Try again.");
  }
</script>

</body>
</html>
